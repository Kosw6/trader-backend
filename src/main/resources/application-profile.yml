spring:
  application:
    name: core
  datasource:
    hikari:
      maximum-pool-size: 150   # 요청 중 DB를 쓰는 비율 × 동시성 × 1.2
      minimum-idle: 20
      connection-timeout: 2000     # ms
      max-lifetime: 1800000        # 30m
      idle-timeout: 30000
    url: jdbc:postgresql://localhost:5432/trader
    username: postgres
    password: 'warandme1!'
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate.jdbc.lob.non_contextual_creation: true
      hibernate.enhancer.enableLazyInitialization: true   # ★ 기본타입 LAZY가 실제로 동작
      hibernate.show_sql: false
      hibernate.format_sql: false
      hibernate.use_sql_comments: false
      hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: localhost   # 도커 컴포즈 redis 사용 시 그대로
      port: 6379
      timeout: 500ms
  cache:
    redis:
      time-to-live: 2m
      key-prefix: "demo::"
      cache-null-values: false
      use-key-prefix: true
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      acks: all
    consumer:
      properties:
        session.timeout.ms: 6000
        heartbeat.interval.ms: 2000
        max.poll.interval.ms: 10000
      group-id: ${SPRING_KAFKA_CONSUMER_GROUP_ID:core-group}
      auto-offset-reset: earliest
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${OAUTH_GOOGLE_CLIENT_ID}
            client-secret: ${OAUTH_GOOGLE_CLIENT_SECRET}
            scope: profile, email
            redirect-uri: "http://localhost:8080/login/oauth2/code/google"
          kakao:
            client-id: ${OAUTH_KAKAO_CLIENT_ID}
            #client-secret: YOUR_KAKAO_CLIENT_SECRET
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "http://localhost:8080/login/oauth2/code/kakao"
            scope: profile_nickname
            #이메일은 나중에 추가 예정
            client-name: Kakao
            provider: kakao
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
  web:
    resources:
      add-mappings: false #정적 리소스 매핑 비활성화
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
    prometheus:
      enabled: true         # ← 명시 (기본 true지만 안전하게)
  prometheus:
    metrics:
      export:
        enabled: true       # ← Prometheus 레지스트리 활성화
      distribution:
        percentiles-histogram:
          hikaricp.connections.usage: true
          hikaricp.connections.acquire: true
          hikaricp.connections.creation: true

  # 응답시간(p95 등) 보려면 히스토그램을 켜야 함
  metrics:
    distribution:
      percentiles-histogram:
        http:
          server:
            requests: true  # ← http.server.requests 히스토그램 ON
    tags:
      application: trader-backend  # (옵션) 공통 태그

# Tomcat 메트릭을 위해 MBean registry 활성화
server:
  port: 8081
  tomcat:
    threads:
      max: 300
      min-spare: 30
    # (선택) 버스트 흡수
    accept-count: 512
    connection-timeout: 10s
    mbeanregistry:
      enabled: true

logging:
  level:
    root: INFO
    org.springframework: ERROR
    org.springframework.web: ERROR
    org.springframework.security: ERROR
    org.springframework.boot.actuate: ERROR
    org.springframework.boot.autoconfigure.security: ERROR
    io.micrometer: ERROR
    io.micrometer.core: ERROR
    io.micrometer.prometheus: ERROR
    reactor.netty: ERROR
    org.apache.catalina: ERROR  # Tomcat
    org.apache.tomcat: ERROR
    com.zaxxer.hikari: ERROR
    org.hibernate: OFF                 # 전체 상한
    org.hibernate.SQL: OFF               # 실행 SQL 줄
    org.hibernate.type: OFF              # 파라미터 타입/바인딩
    org.hibernate.orm.jdbc.bind: OFF     # (Hibernate 6) 바인드 값 디버그
    org.hibernate.orm.results: OFF       # (Hibernate 6) 결과 매핑 로그
    org.hibernate.engine.jdbc.spi.SqlExceptionHelper: ERROR  # SQL 경고는 숨기고 에러만
    org.hibernate.type.descriptor.sql.BasicBinder: OFF  # (Hibernate 5 계열)
    org.hibernate.orm.jdbc.extract: OFF                 # (Hibernate 6 계열)
    org.apache.kafka.clients.NetworkClient: error
    org.apache.kafka.clients.consumer.internals.ConsumerCoordinator: warn
    org.apache.kafka.clients.Metadata: warn
#    org.springframework.kafka.config: DEBUG
#    org.springframework.kafka.listener: DEBUG
#    org.springframework.kafka.annotation: DEBUG
#    org.apache.kafka.clients.consumer: DEBUG
#    org.springframework.web.socket: DEBUG
#    org.springframework.web.socket.handler: DEBUG
#    org.springframework.web.socket.server: DEBUG

eureka:
  client:
    enabled: true
    register-with-eureka: true
    fetch-registry: true
    serviceUrl:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
  instance:
    metadata-map:
      shard-id: ${WS_SHARD_ID}
    prefer-ip-address: true
    instance-id: ${EUREKA_INSTANCE_INSTANCE_ID:${spring.application.name}:${server.port}}

app:
  role: core
  instance-id: ${APP_INSTANCE_ID:core-1}
  kafka:
    topic:
      canvas-events: ${APP_KAFKA_TOPIC_CANVAS_EVENTS:canvas-events}
    consumer-group: ${APP_KAFKA_CONSUMER_GROUP:core-group}
    broadcast-group-id: ${APP_KAFKA_BROADCAST_GROUP_ID:canvas-broadcast-group}
    catchup-group-id: ${APP_KAFKA_CATCHUP_GROUP_ID:canvas-replay}